{%- comment -%} Sticky masthead. Links come from _data/navigation.yml; `page.nav`
  drives the active-link highlight. {%- endcomment -%}
{%- assign n = site.data.navigation -%}
<header class="nav">
  <div class="nav__inner">
    <div class="brand">
      <a class="brand__lockup" href="{{ '/' | relative_url }}">
        <img class="brand__mark" src="{{ '/assets/brand/mark.svg' | relative_url }}" alt="" width="30" height="30">
        <span class="brand__word">cupids<span class="green">-</span>lab</span>
      </a>
    </div>
    <button class="nav__toggle" aria-expanded="false" aria-label="Toggle navigation">menu</button>
    <nav class="nav__links" aria-label="Primary">
      {%- for item in n.primary %}
      <a href="{{ item.url | relative_url }}" class="{% if page.nav == item.key %}is-active{% endif %}">{{ item.label }}</a>
      {%- endfor %}
      <a href="{{ n.cta.url | relative_url }}" class="btn btn--gold btn--nav">{{ n.cta.label }}</a>
    </nav>
  </div>
</header>
