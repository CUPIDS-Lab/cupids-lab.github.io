# ============================================================
#  CUPIDS Lab — University of Colorado Public Interest Data
#  Science Laboratory. Jekyll configuration.
# ============================================================

title: CUPIDS Lab
tagline: Defending the data democracy depends on.
description: "The University of Colorado Public Interest Data Science Laboratory (CUPIDS Lab) archives at-risk public datasets, builds data infrastructure, and provides technical capacity for civic watchdogs."

# Home hero + mission — single source of truth (the home page and SEO read these).
# `tagline` is the hero headline, `hero_lead` the hero lead, `description` the SEO/meta description.
hero_eyebrow: "University of Colorado Public Interest Data Science Lab"
hero_lead: "Rescuing datasets. Building data infrastructure. Connecting experts. Supporting the public interest."
mission: "A laboratory for teaching data science in the public interest, a clinic connecting Colorado's watchdogs to technical capacity, and a network for preserving evidence for democratic accountability."
location: "Boulder, Colorado"

# Served at the org root: https://cupids-lab.github.io
url: "https://cupids-lab.github.io"
baseurl: ""

# Social-share image (generated PNG preview; see script/rasterize.mjs).
image: /assets/brand/og.png
twitter:
  card: summary_large_image

lang: en
author: CUPIDS Lab
email: brian.keegan@colorado.edu
github_org: CUPIDS-Lab
github_url: https://github.com/CUPIDS-Lab

# Optional Formspree form endpoint. Leave blank to keep the design's
# client-side "thank you" confirmation (no data is sent anywhere).
# When set (e.g. https://formspree.io/f/xxxxxxxx) the help-desk, join,
# and subscribe forms POST to it.
form_endpoint: ""

# Build settings ---------------------------------------------
markdown: kramdown
highlighter: rouge
permalink: pretty

plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap

# Collections — one Markdown file per item; each gets its own child page
# under the parent section.
collections:
  # Top-level pages live in _pages to keep the repo root tidy; each sets its
  # own `permalink` so URLs are unchanged.
  pages:
    output: true
  dispatch:
    output: true
    permalink: /dispatch/:name/
  projects:
    output: true
    permalink: /projects/:name/
  people:
    output: true
    permalink: /people/:name/
  resources:
    output: true
    permalink: /resources/:name/

# jekyll-feed: generate the Dispatch feed from the collection
feed:
  collections:
    dispatch:
      path: dispatch/feed.xml

sass:
  style: compressed

exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - LICENSE
  - AGENTS.md
  - vendor
  - .github
  - script
  - node_modules
  - package.json
  - package-lock.json
  - "*.gem"

# Default front matter --------------------------------------
defaults:
  - scope:
      path: ""
    values:
      layout: page
      image: /assets/brand/og.png   # default social-share image (jekyll-seo-tag)
  - scope:
      path: ""
      type: dispatch
    values:
      layout: dispatch
  - scope:
      path: ""
      type: projects
    values:
      layout: detail
      eyebrow: Project
      back: /projects/
      back_label: Projects
  - scope:
      path: ""
      type: people
    values:
      layout: detail
      eyebrow: People
      back: /people/
      back_label: People
  - scope:
      path: ""
      type: resources
    values:
      layout: detail
      eyebrow: Resource
      back: /resources/
      back_label: Resources
