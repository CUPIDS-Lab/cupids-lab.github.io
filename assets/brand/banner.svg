<text x="80" y="150.0" font-family="IBM Plex Mono, ui-monospace, monospace" font-size="26" letter-spacing="0.16em" fill="#6fcf97">UNIVERSITY OF COLORADO · PUBLIC INTEREST DATA SCIENCE</text>
<text x="80" y="246.0" font-family="IBM Plex Mono, ui-monospace, monospace" font-weight="600" font-size="92" text-anchor="start" letter-spacing="0.01em">
