<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" role="img" aria-label="CUPIDS Lab">
<metadata>CUPIDS Lab — generated from _data/brand.yml. A brand and graphic identity for an academic public interest data lab. A black terminal with monospace fonts and syntax initially feels intimidating and cold. A near-black canvas, CU gold accents, an IBM Plex Mono "cupids-lab" wordmark. The central conceit is a "folder with arrow" — the data the public interest depends on, stored in file folders and pierced open by CUPID's golden arrow (matchmaking data and democracy). A palette of color folders provides variation in the decorative art. Restrained and civic, with a little matchmaker playfulness.</metadata>
