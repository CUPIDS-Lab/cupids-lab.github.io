    url: /projects/cej/
    body: "In partnership with the Center for Environmental Journalism, CUPIDS is identifying, prioritizing, and archiving the federal environmental datasets most critical to Colorado journalism — and equipping reporters to use them when primary sources go dark. Supported by the 2026 de Castro Research Award, with Hong Tien Vu, Director, CEJ."
