# ============================================================
#  Brand identity — single source of truth.
#  Human spec + prompt live in AGENTS.md ("## Brand identity").
#  Regenerate assets:  ruby script/generate-brand.rb
# ============================================================
name: "CUPIDS Lab"
wordmark: "cupids-lab"
tagline: "Defending the data democracy depends on."

# A short brand prompt the harness "digests" (and that you could hand to a
# designer or an image model).
prompt: 'A brand and graphic identity for an academic public interest data lab. A black terminal with monospace fonts and syntax initially feels intimidating and cold. A near-black canvas, CU gold accents, an IBM Plex Mono "cupids-lab" wordmark. The recurring Cupid idiom is a "heart with arrow" drawn as 8-bit pixel art — a retro, terminal / coding-agent nod rather than the proprietary emoji. The Unicode "color heart" palette still provides variation in the decorative art, and the ASCII heart "<3" lives on as playful microcopy. Restrained and civic with a little matchmaker playfulness.'

# Recurring motif emoji. The mark itself is now drawn as 8-bit pixel art (see
# `mark:` below + script/generate-brand.rb); `primary` is still used for the
# decorative color-emoji palette art (og/banner/pattern/background) and the
# hero canvas. `wordmark_glyph` is no longer part of the wordmark — the ASCII
# heart survives only as playful microcopy (e.g. the subscribe confirmation).
emoji:
  primary: "💘"        # heart with arrow (Cupid) — used in the palette art + hero
  wordmark_glyph: "<3" # legacy motif; kept for microcopy, not rendered in the wordmark
  # The Unicode "<color> heart" palette we draw from (black omitted — it
  # disappears on the dark canvas).
  palette:
    - { name: red,    char: "❤️", color: "#ed4e5b" }
    - { name: orange, char: "🧡", color: "#f0883e" }
    - { name: yellow, char: "💛", color: "#f7c948" }
    - { name: green,  char: "💚", color: "#6fcf97" }
    - { name: blue,   char: "💙", color: "#4a9fe6" }
    - { name: purple, char: "💜", color: "#9b6dd6" }
    - { name: brown,  char: "🤎", color: "#9c6b4a" }
    - { name: white,  char: "🤍", color: "#e8e6e0" }
    - { name: pink,   char: "💘", color: "#f06fa0" }

# Core colors (mirror of the CSS tokens in assets/css/style.css).
colors:
  bg: "#0e0f12"
  panel: "#16181d"
  ink: "#e8e6e0"
  muted: "#8a8f98"
  gold: "#cfb87c"
  red: "#b23a2e"
  green: "#6fcf97"
  amber: "#e0a14e"

fonts:
  display: "Public Sans"
  mono: "IBM Plex Mono"

# The heart-with-arrow mark, redrawn as 8-bit pixel art (a retro / terminal
# nod) instead of the Apple emoji glyph — pure <rect>s, so it's license-clean
# and renders identically everywhere. These colors drive script/generate-brand.rb.
mark:
  style: "8-bit"          # pixel-art "heart with arrow" (not the proprietary emoji)
  heart:    "#f06fa0"     # pink heart body
  heart_hi: "#ffb3d1"     # upper-left highlight (8-bit sheen)
  heart_lo: "#c44f86"     # lower-right shadow
  arrow:    "#e7b53f"     # Cupid's golden arrow
  arrow_lo: "#b07f2c"     # arrow shadow / fletching

# Standalone heart icon per palette color, emitted to assets/brand/hearts/ as
# both SVG and PNG (e.g. hearts/green.svg, hearts/green.png) for reuse as list
# bullets, scatter art, etc.
variants:
  dir: hearts
  rotations: [0]

# Assets the harness emits into assets/brand/ (SVG, deterministic).
# `ruby script/generate-brand.rb` writes the SVGs; `node script/rasterize.mjs`
# exports PNG previews next to them (headless Chrome + Noto Color Emoji).
assets:
  - { file: favicon.svg,    w: 64,   h: 64,  kind: mark }
  - { file: mark.svg,       w: 96,   h: 96,  kind: pixmark }   # transparent, inline (nav/footer)
  - { file: avatar.svg,     w: 512,  h: 512, kind: avatar }
  - { file: og.svg,         w: 1200, h: 630, kind: og }
  - { file: banner.svg,     w: 1500, h: 500, kind: og }
  - { file: pattern.svg,    w: 240,  h: 240, kind: pattern }
  - { file: background.svg, w: 1600, h: 900, kind: background }
