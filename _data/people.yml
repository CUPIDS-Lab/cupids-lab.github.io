director:
  name: Brian C. Keegan
  role: "Associate Professor, Department of Information Science · CU Boulder"
  email: brian.keegan@colorado.edu
  github: github.com/CUPIDS-Lab
  url: /people/brian-keegan/
  bio: |
    A computational social scientist with eighteen years studying how people collaborate online — on Wikipedia, Reddit, Twitter, and beyond. That research has always depended on open data, and on watching access to it systematically erode as platforms enclosed the information commons.
    He has taught "Information Expositions" for eight years, serves as Vice Chair of one of the nation's first cannabis licensing boards, and writes a data-driven column for the Boulder Reporting Lab. CUPIDS is the synthesis of that research, teaching, and civic work.
